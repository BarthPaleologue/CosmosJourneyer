name: Deploy Release

on:
    workflow_dispatch:
        inputs:
            version:
                description: "Release version, e.g. 1.11.0"
                required: true
                type: string
            dry_run:
                description: "Run deployment rsync commands without changing the VPS"
                required: true
                type: boolean
                default: true

jobs:
    deploy-game:
        name: Build and deploy game artifact
        permissions:
            contents: read
        timeout-minutes: 20
        runs-on: ubuntu-latest
        environment:
            name: production
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  lfs: true

            - name: Setup pnpm
              uses: pnpm/action-setup@v6

            - name: Use Node.js 24
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Setup Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: wasm32-unknown-unknown

            - name: Setup wasm-pack
              uses: taiki-e/install-action@v2
              with:
                  tool: wasm-pack

            - name: Build game artifact
              run: pnpm build:game

            - name: Configure SSH agent
              uses: webfactory/ssh-agent@v0.9.0
              with:
                  ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

            - name: Add VPS to known hosts
              env:
                  VPS_HOST: ${{ secrets.VPS_HOST }}
                  VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || 22 }}
              run: |
                  mkdir -p ~/.ssh
                  ssh-keyscan -p "$VPS_SSH_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts

            - name: Deploy game artifact to VPS
              env:
                  DEPLOY_DRY_RUN: ${{ inputs.dry_run }}
                  VPS_HOST: ${{ secrets.VPS_HOST }}
                  VPS_USERNAME: ${{ secrets.VPS_USERNAME }}
                  VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || 22 }}
                  VPS_GAME_PATH: ${{ secrets.VPS_GAME_PATH }}
              run: bash ./scripts/deploy-game-vps.sh

    build-electron:
        name: Build Electron artifacts
        permissions:
            contents: read
        timeout-minutes: 30
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: macos-latest
                    - os: ubuntu-latest
                    - os: windows-latest

        runs-on: ${{ matrix.os }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  lfs: true

            - name: Setup pnpm
              uses: pnpm/action-setup@v6

            - name: Use Node.js 24
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Install Electron runtime
              shell: bash
              run: node "$(echo node_modules/.pnpm/electron@*/node_modules/electron/install.js)"

            - name: Prepare electron-winstaller
              if: runner.os == 'Windows'
              shell: bash
              run: node "$(echo node_modules/.pnpm/electron-winstaller@*/node_modules/electron-winstaller/script/select-7z-arch.js)"

            - name: Build desktop packages
              run: pnpm --filter @cosmos-journeyer/desktop-electron package

            - name: Upload desktop artifacts
              uses: actions/upload-artifact@v7
              with:
                  name: electron-${{ matrix.os }}
                  path: packages/desktop-electron/release/*

    publish-electron:
        name: Create draft GitHub release
        if: ${{ !inputs.dry_run }}
        needs:
            - build-electron
            - deploy-game
        permissions:
            contents: write
        runs-on: ubuntu-latest
        steps:
            - name: Download desktop artifacts
              uses: actions/download-artifact@v7
              with:
                  pattern: electron-*
                  merge-multiple: true
                  path: release-assets

            - name: Create draft release
              uses: softprops/action-gh-release@v2
              with:
                  draft: true
                  tag_name: v${{ inputs.version }}
                  name: Cosmos Journeyer v${{ inputs.version }}
                  body: |
                      The new version of Cosmos Journeyer is online at https://cosmosjourneyer.com/
                      This draft release contains Electron desktop builds.
                  files: release-assets/*
                  fail_on_unmatched_files: true
