name: CI

on:
    pull_request:
        branches: [main]
    workflow_dispatch:

concurrency:
    group: ci-${{ github.head_ref || github.ref_name || github.run_id }}
    cancel-in-progress: true

jobs:
    ci:
        name: ci
        runs-on: ubuntu-latest
        timeout-minutes: 40
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  lfs: false

            - name: Compute Git LFS cache key
              id: git-lfs-cache-key
              run: |
                  git lfs ls-files --long | sort | sha256sum | cut -d " " -f 1 > /tmp/git-lfs-cache-key
                  echo "key=$(cat /tmp/git-lfs-cache-key)" >> "$GITHUB_OUTPUT"

            - name: Cache Git LFS objects
              uses: actions/cache@v5
              with:
                  path: .git/lfs
                  key: git-lfs-${{ runner.os }}-${{ steps.git-lfs-cache-key.outputs.key }}
                  restore-keys: git-lfs-${{ runner.os }}-

            - name: Pull Git LFS assets
              run: git lfs pull

            - name: Setup pnpm
              uses: pnpm/action-setup@v6

            - name: Use Node.js 24
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Setup Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: wasm32-unknown-unknown

            - name: Setup wasm-pack
              uses: taiki-e/install-action@v2
              with:
                  tool: wasm-pack

            - name: Format check
              run: pnpm format:check

            - name: Typecheck
              run: pnpm typecheck

            - name: Lint
              run: pnpm lint

            - name: Unit tests
              run: pnpm test:unit

            - name: Build documentation
              run: pnpm doc

            - name: Build packages
              run: pnpm build

            - name: Install Playwright Chromium
              run: pnpm --filter @cosmos-journeyer/game exec playwright install --with-deps chromium

            - name: Run Playwright suite
              run: |
                  mkdir -p packages/game/artifacts
                  pnpm --filter @cosmos-journeyer/game exec playwright test \
                    --output=artifacts/test-results \
                    --reporter=line,html

            - name: Upload Playwright artifacts
              if: failure()
              uses: actions/upload-artifact@v7
              with:
                  name: test-results
                  path: |
                      packages/game/artifacts
                      packages/game/playwright-report
