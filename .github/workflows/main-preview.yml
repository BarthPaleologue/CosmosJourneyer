name: Deploy (Main Preview)
on:
    push:
        branches:
            - main

permissions:
    contents: write

concurrency:
    group: main-preview
    cancel-in-progress: true

jobs:
    deploy:
        timeout-minutes: 10
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js with pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 9

            - name: Install dependencies
              run: pnpm i

            - name: Check formatting
              run: pnpm run format:check

            - name: Lint project
              run: pnpm run lint

            - name: Test project
              run: pnpm test:unit

            - name: Build applications
              run: |
                  pnpm build
                  pnpm build:playground
                  pnpm build:black-hole-demo
                  rm -rf dist
                  mkdir -p dist
                  cp -r packages/game/dist/* dist/
                  mkdir -p dist/playground
                  cp -r packages/playground/dist/* dist/playground/
                  mkdir -p dist/black-hole-demo
                  cp -r packages/black-hole-demo/dist/* dist/black-hole-demo/

            - name: Deploy to GitHub Pages (Production)
              uses: JamesIves/github-pages-deploy-action@v4
              with:
                  folder: dist
                  branch: gh-pages
                  clean: false
                  force: false
                  target-folder: preview
