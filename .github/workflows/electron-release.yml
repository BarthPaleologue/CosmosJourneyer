name: Electron Build And Release

on:
    workflow_dispatch:

jobs:
    build-electron:
        permissions:
            contents: write
        timeout-minutes: 30
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: macos-latest
                    - os: ubuntu-latest
                    - os: windows-latest

        runs-on: ${{ matrix.os }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  lfs: true

            - name: Setup pnpm
              uses: pnpm/action-setup@v6

            - name: Use Node.js 24
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Install Electron runtime
              shell: bash
              run: node "$(echo node_modules/.pnpm/electron@*/node_modules/electron/install.js)"

            - name: Prepare electron-winstaller
              if: runner.os == 'Windows'
              shell: bash
              run: node "$(echo node_modules/.pnpm/electron-winstaller@*/node_modules/electron-winstaller/script/select-7z-arch.js)"

            - name: Build desktop packages
              run: pnpm --filter @cosmos-journeyer/desktop-electron package

            - name: Upload desktop artifacts
              uses: actions/upload-artifact@v7
              with:
                  name: electron-${{ matrix.os }}
                  path: packages/desktop-electron/release/*

    publish-electron:
        needs: build-electron
        permissions:
            contents: write
        runs-on: ubuntu-latest
        steps:
            - name: Download desktop artifacts
              uses: actions/download-artifact@v7
              with:
                  pattern: electron-*
                  merge-multiple: true
                  path: release-assets

            - name: Create draft release
              uses: softprops/action-gh-release@v2
              with:
                  draft: true
                  tag_name: v${{ github.run_number }}
                  name: Cosmos Journeyer v${{ github.run_number }}
                  body: |
                      The new version of Cosmos Journeyer is online at https://cosmosjourneyer.com/
                      This draft release contains Electron desktop builds.
                  files: release-assets/*
