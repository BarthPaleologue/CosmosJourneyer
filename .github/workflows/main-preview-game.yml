name: Deploy Game (Main Preview)
on:
    push:
        branches:
            - main

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: github-pages
    cancel-in-progress: false

jobs:
    build_game_preview:
        timeout-minutes: 10
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  lfs: true

            - name: Setup Node.js with pnpm
              uses: pnpm/action-setup@v6

            - name: Use Node.js 24
              uses: actions/setup-node@v6
              with:
                  node-version: "24"
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Setup Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: wasm32-unknown-unknown

            - name: Setup wasm-pack
              uses: taiki-e/install-action@v2
              with:
                  tool: wasm-pack

            - name: Check formatting
              run: pnpm run format:check

            - name: Lint project
              run: pnpm run lint

            - name: Test project
              run: pnpm test:unit

            - name: Build project
              run: pnpm run build

            - name: Configure GitHub Pages
              uses: actions/configure-pages@v6

            - name: Upload game preview artifact
              uses: actions/upload-pages-artifact@v5
              with:
                  path: packages/game/dist

    deploy_game_preview:
        needs: build_game_preview
        timeout-minutes: 10
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy game preview to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v5
