name: Game CI
on:
    push:
        branches: [main]
        paths:
            - "packages/game/**"
            - "package.json"
            - "pnpm-lock.yaml"
            - "pnpm-workspace.yaml"
            - "tsconfig.base.json"
            - "tsconfig.json"
            - ".github/workflows/game-ci.yml"
    pull_request:
        branches: [main]
        paths:
            - "packages/game/**"
            - "package.json"
            - "pnpm-lock.yaml"
            - "pnpm-workspace.yaml"
            - "tsconfig.base.json"
            - "tsconfig.json"
            - ".github/workflows/game-ci.yml"
    workflow_dispatch:

concurrency:
    group: game-ci-${{ github.head_ref || github.ref_name || github.run_id }}
    cancel-in-progress: true

jobs:
    game-validation:
        name: game-specific-checks
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - name: Checkout repository with LFS
              uses: actions/checkout@v4
              with:
                  lfs: true
                  fetch-depth: 0

            - name: Cache Git-LFS objects
              uses: actions/cache@v4
              with:
                  path: ~/.git/lfs/
                  key: lfs-${{ runner.os }}-${{ hashFiles('.gitattributes') }}

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Use Node.js 24
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Install Playwright Chromium
              run: pnpm --filter @cosmos-journeyer/game exec playwright install --with-deps chromium

            - name: Run Playwright suite
              run: |
                  mkdir -p packages/game/artifacts
                  pnpm --filter @cosmos-journeyer/game test:e2e \
                    --output=artifacts/test-results \
                    --reporter=line,html

            - name: Upload Playwright artifacts
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: test-results
                  path: |
                      packages/game/artifacts
                      packages/game/playwright-report
