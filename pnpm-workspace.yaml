    eslint-import-resolver-typescript: ^4.4.5
    eslint-plugin-import-x: ^4.16.2
    http-server: ^14.1.1
    jsdom: ^29.1.1
    oxfmt: ^0.54.0
    typedoc: ^0.28.19
    typedoc-github-theme: ^0.4.0
    typedoc-plugin-missing-exports: ^4.1.3
    typescript: ^6.0.3
    typescript-eslint: ^8.61.0
    vite: ^8.0.16
    vitest: ^4.1.9
    zod: ^4.4.3
